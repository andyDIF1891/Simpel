<meta charset="UTF-8">

<title>Möten CRM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }

  .topbar { background: #fff; border-bottom: 1px solid #e5e5e2; padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; }

  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .save-badge { font-size: 11px; color: #3b6d11; background: #eaf3de; padding: 3px 10px; border-radius: 12px; display: none; }
  .save-badge.show { display: inline-block; }

  .layout { display: flex; height: calc(100vh - 52px); }

  .sidebar { width: 200px; background: #fff; border-right: 1px solid #e5e5e2; padding: 16px 0; flex-shrink: 0; }
  .sidebar-label { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; padding: 0 16px 8px; }
  .month-btn { display: block; width: 100%; text-align: left; padding: 8px 16px; border: none; background: none; cursor: pointer; font-size: 13px; color: #555; border-left: 3px solid transparent; transition: all .1s; }
  .month-btn:hover { background: #f5f5f3; color: #1a1a1a; }
  .month-btn.active { color: #185fa5; background: #e6f1fb; border-left-color: #185fa5; font-weight: 500; }
  .month-count { float: right; font-size: 11px; background: #e5e5e2; border-radius: 10px; padding: 1px 7px; color: #666; }
  .month-btn.active .month-count { background: #b5d4f4; color: #0c447c; }

  .sidebar-divider { border: none; border-top: 1px solid #e5e5e2; margin: 12px 0; }

  .sidebar-action { display: block; width: 100%; text-align: left; padding: 8px 16px; border: none; background: none; cursor: pointer; font-size: 13px; color: #185fa5; font-weight: 500; }
  .sidebar-action:hover { background: #f5f5f3; }

  .main { flex: 1; overflow: auto; padding: 24px; }

  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .search-input { flex: 1; min-width: 200px; padding: 7px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: #fff; }
  .search-input:focus { outline: none; border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,.1); }
  .filter-select { padding: 7px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: #fff; }
  .btn-new { padding: 7px 16px; background: #185fa5; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .btn-new:hover { background: #0c447c; }

  .stats-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: #fff; border: 1px solid #e5e5e2; border-radius: 10px; padding: 12px 16px; min-width: 90px; }
  .stat-val { font-size: 24px; font-weight: 600; color: #1a1a1a; }
  .stat-lbl { font-size: 11px; color: #888; margin-top: 2px; }

  .table-card { background: #fff; border: 1px solid #e5e5e2; border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e5e5e2; color: #888; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; background: #fafaf8; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f0ee; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf8; }

  .co-name { font-weight: 500; color: #1a1a1a; }
  .note-cell { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #888; font-size: 12px; }
  .date-cell { white-space: nowrap; color: #888; font-size: 12px; }

  .badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .badge-mv { background: #e6f1fb; color: #0c447c; }
  .badge-ak { background: #eaf3de; color: #27500a; }
  .badge-klingan { background: #faeeda; color: #633806; }
  .badge-po { background: #eeedfe; color: #3c3489; }
  .badge-other { background: #f1efe8; color: #444441; }

  .status-text { font-size: 12px; color: #555; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .row-actions { display: flex; gap: 4px; }
  .btn-icon { padding: 4px 9px; font-size: 11px; border: 1px solid #e0e0dd; border-radius: 6px; cursor: pointer; background: #fff; color: #555; }
  .btn-icon:hover { background: #f5f5f3; }
  .btn-icon.danger:hover { background: #fcebeb; color: #a32d2d; border-color: #f09595; }

  .empty-state { text-align: center; padding: 48px; color: #aaa; font-size: 14px; }

  /* Modal overlay */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 24px; width: 540px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-full { grid-column: 1 / -1; }
  .form-group label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 8px 11px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-family: inherit; background: #fff; color: #1a1a1a;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,.1); }
  .form-group textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid #e5e5e2; }
  .btn-cancel { padding: 8px 18px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 13px; cursor: pointer; color: #555; }
  .btn-cancel:hover { background: #f5f5f3; }
  .btn-save { padding: 8px 18px; background: #185fa5; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-save:hover { background: #0c447c; }

  /* Detail modal */
  .detail-table td { padding: 6px 0; vertical-align: top; }
  .detail-table td:first-child { color: #888; width: 130px; font-size: 12px; }
  .note-block { background: #f5f5f3; border-radius: 8px; padding: 12px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; margin-top: 8px; color: #333; }

  /* Export area */
  .export-area { padding: 16px; }
  .export-area p { font-size: 13px; color: #666; margin-bottom: 12px; }
  .btn-export { padding: 8px 16px; background: #3b6d11; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; margin-right: 8px; }
  .btn-export:hover { background: #27500a; }
  .btn-import-label { display: inline-block; padding: 8px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; cursor: pointer; background: #fff; color: #555; }
  .btn-import-label:hover { background: #f5f5f3; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Möten CRM</h1>
  <div class="topbar-right">
    <span class="save-badge" id="save-badge">Sparad</span>
  </div>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-label">Månader</div>
    <div id="month-nav"></div>
    <hr class="sidebar-divider">
    <button class="sidebar-action" onclick="openNew()">+ Nytt möte</button>

    <button class="sidebar-action" onclick="document.getElementById('import-file').click()">Importera data</button>

  </nav>

  <main class="main" id="main"></main>
</div>

<!-- Form modal -->
<div class="overlay" id="form-overlay">
  <div class="modal" id="form-modal">
    <h2 id="form-title">Nytt möte</h2>
    <div class="form-grid" id="form-fields"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('form-overlay')">Avbryt</button>
      <button class="btn-save" onclick="saveForm()">Spara möte</button>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="overlay" id="detail-overlay">
  <div class="modal" id="detail-modal"></div>
</div>

<!-- Export modal -->
<div class="overlay" id="export-overlay">
  <div class="modal">
    <h2>Exportera / Importera</h2>
    <div class="export-area">
      <p>Exportera all data som en JSON-fil som du kan spara som backup eller importera på en annan dator.</p>
      <button class="btn-export" onclick="exportData()">Ladda ner JSON-backup</button>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('export-overlay')">Stäng</button>
    </div>
  </div>
</div>

// --- Storage ---
let data, nextId = 400;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const d = JSON.parse(raw); data = d.data; nextId = d.nextId || 400; }
    else { data = defaultData(); }
  } catch(e) { data = defaultData(); }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ data, nextId }));
    const b = document.getElementById('save-badge');
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 1800);
  } catch(e) {}
}

// --- Helpers ---
function badgeClass(a) {
  if (!a) return 'badge-other';
  const v = a.toUpperCase();
  if (v === 'MV') return 'badge-mv';
  if (v === 'AK' || v === 'AK/MV') return 'badge-ak';
  if (v === 'KLINGAN') return 'badge-klingan';
  if (v === 'PO') return 'badge-po';
  return 'badge-other';
}

function filtered() {
  let rows = data[state.activeMonth] || [];
  if (state.filterText) {
    const q = state.filterText.toLowerCase();
    rows = rows.filter(r =>
      (r.foretag||'').toLowerCase().includes(q) ||
      (r.kontakt||'').toLowerCase().includes(q) ||
      (r.anteckning||'').toLowerCase().includes(q) ||
      (r.status||'').toLowerCase().includes(q)
    );
  }
  if (state.filterAnsvarig) rows = rows.filter(r => (r.ansvarig||'').toUpperCase() === state.filterAnsvarig);
  return rows;
}

function allAnsvariga() {
  const s = new Set();
  Object.values(data).forEach(rows => rows.forEach(r => { if (r.ansvarig) s.add(r.ansvarig.toUpperCase()); }));
  return [...s].sort();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// --- Render ---
function renderNav() {
  const all = Object.values(data).flat().length;
  document.getElementById('month-nav').innerHTML = MONTHS.map(m =>
    `<button class="month-btn${state.activeMonth===m?' active':''}" onclick="setMonth('${m}')">
      ${m.charAt(0).toUpperCase()+m.slice(1)}
      <span class="month-count">${(data[m]||[]).length}</span>
    </button>`
  ).join('') + `<button class="month-btn${state.activeMonth==='alle'?' active':''}" onclick="setMonth('alle')">Alla månader <span class="month-count">${all}</span></button>`;
}

function renderMain() {
  const all = Object.values(data).flat();
  const rows = state.activeMonth === 'alle' ? filteredAll() : filtered();
  const hasDatum = state.activeMonth !== 'mars';

  const statsHTML = `<div class="stats-row">
    <div class="stat-card"><div class="stat-val">${all.length}</div><div class="stat-lbl">Totalt möten</div></div>

  </div>`;

  const toolbarHTML = `<div class="toolbar">

      <option value="">Alla ansvariga</option>
      ${allAnsvariga().map(a=>`<option${state.filterAnsvarig===a?' selected':''}>${a}</option>`).join('')}

  let tableHTML;
  if (!rows.length) {

  } else {
    tableHTML = `<div class="table-card"><table>
      <thead><tr>
        ${state.activeMonth==='alle'?'<th>Månad</th>':''}
        ${hasDatum||state.activeMonth==='alle'?'<th>Datum</th>':''}

      <tbody>

          ${state.activeMonth==='alle'?`<td style="font-size:12px;color:#888">${r._month||''}</td>`:''}
          ${hasDatum||state.activeMonth==='alle'?`<td class="date-cell">${r.datum||''}</td>`:''}
          <td class="co-name">${esc(r.foretag)}</td>
          <td>${esc(r.kontakt)}</td>
          <td style="white-space:nowrap;font-size:12px">${esc(r.tfn)}</td>
          <td><span class="badge ${badgeClass(r.ansvarig)}">${esc(r.ansvarig)}</span></td>
          <td class="status-text">${esc(r.status)}</td>
          <td><div class="note-cell" title="${esc(r.anteckning)}">${esc(r.anteckning)}</div></td>
          <td><div class="row-actions">
            <button class="btn-icon" onclick="showDetail(${r.id})">Visa</button>
            <button class="btn-icon" onclick="openEdit(${r.id})">Redigera</button>
            <button class="btn-icon danger" onclick="deleteRow(${r.id})">Ta bort</button>
          </div></td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
  }

  document.getElementById('main').innerHTML = statsHTML + toolbarHTML + tableHTML;
}

function filteredAll() {
  let rows = [];
  MONTHS.forEach(m => { (data[m]||[]).forEach(r => rows.push({...r, _month: m})); });
  if (state.filterText) {
    const q = state.filterText.toLowerCase();
    rows = rows.filter(r => (r.foretag||'').toLowerCase().includes(q)||(r.kontakt||'').toLowerCase().includes(q)||(r.anteckning||'').toLowerCase().includes(q)||(r.status||'').toLowerCase().includes(q));
  }
  if (state.filterAnsvarig) rows = rows.filter(r => (r.ansvarig||'').toUpperCase() === state.filterAnsvarig);
  return rows;
}

function render() { renderNav(); renderMain(); }

// --- Actions ---
function setMonth(m) { state.activeMonth = m; render(); }
function setFilter(v) { state.filterText = v; renderMain(); }
function setAnsvarig(v) { state.filterAnsvarig = v; renderMain(); }

function showDetail(id) {
  const row = Object.values(data).flat().find(r => r.id === id);
  if (!row) return;
  document.getElementById('detail-modal').innerHTML = `
    <h2>${esc(row.foretag)}</h2>
    <table class="detail-table" style="width:100%;margin-bottom:16px">
      <tr><td>Kontaktperson</td><td>${esc(row.kontakt)||'–'}</td></tr>
      <tr><td>Telefon</td><td>${esc(row.tfn)||'–'}</td></tr>
      <tr><td>Mail</td><td style="color:#185fa5">${esc(row.mail)||'–'}</td></tr>
      ${row.datum?`<tr><td>Datum</td><td>${esc(row.datum)}</td></tr>`:''}
      <tr><td>Ansvarig</td><td><span class="badge ${badgeClass(row.ansvarig)}">${esc(row.ansvarig)||'–'}</span></td></tr>
      <tr><td>Status</td><td>${esc(row.status)||'–'}</td></tr>
    </table>
    ${row.anteckning?`<div style="font-size:12px;color:#888;margin-bottom:6px">Anteckning</div><div class="note-block">${esc(row.anteckning)}</div>`:''}
    <div class="modal-footer"><button class="btn-save" onclick="closeModal('detail-overlay')">Stäng</button></div>
  `;
  document.getElementById('detail-overlay').classList.add('open');
}

function openNew() {
  state.editId = null;
  renderForm(null);
  document.getElementById('form-overlay').classList.add('open');
}

function openEdit(id) {
  state.editId = id;
  const row = Object.values(data).flat().find(r => r.id === id);
  renderForm(row);
  document.getElementById('form-overlay').classList.add('open');
}

function renderForm(row) {
  document.getElementById('form-title').textContent = row ? 'Redigera möte' : 'Nytt möte';
  const hasDatum = state.activeMonth !== 'mars';
  const r = row || {};
  document.getElementById('form-fields').innerHTML = `
    ${hasDatum?`<div class="form-group form-full"><label>Datum och tid</label><input type="text" id="f-datum" value="${esc(r.datum||'')}" placeholder="2026-06-10 1000"></div>`:''}
    <div class="form-group form-full"><label>Företag *</label><input type="text" id="f-foretag" value="${esc(r.foretag||'')}"></div>
    <div class="form-group"><label>Kontaktperson</label><input type="text" id="f-kontakt" value="${esc(r.kontakt||'')}"></div>
    <div class="form-group"><label>Telefon</label><input type="text" id="f-tfn" value="${esc(r.tfn||'')}"></div>
    <div class="form-group form-full"><label>Mail</label><input type="email" id="f-mail" value="${esc(r.mail||'')}"></div>
    <div class="form-group"><label>Ansvarig (Account)</label>
      <select id="f-ansvarig">
        ${ACCOUNTS.map(a=>`<option${(r.ansvarig||'MV')===a?' selected':''}>${a}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Status</label>
      <input type="text" id="f-status" value="${esc(r.status||'')}" list="status-list">
      <datalist id="status-list">${STATUSES.map(s=>`<option>${s}</option>`).join('')}</datalist>
    </div>
    <div class="form-group form-full"><label>Anteckning</label><textarea id="f-anteckning">${esc(r.anteckning||'')}</textarea></div>
  `;
}

function saveForm() {
  const hasDatum = state.activeMonth !== 'mars';
  const foretag = document.getElementById('f-foretag').value.trim();
  if (!foretag) { alert('Fyll i företagsnamn.'); return; }
  const row = {
    foretag,
    kontakt: document.getElementById('f-kontakt').value,
    tfn: document.getElementById('f-tfn').value,
    mail: document.getElementById('f-mail').value,
    ansvarig: document.getElementById('f-ansvarig').value,
    status: document.getElementById('f-status').value,
    anteckning: document.getElementById('f-anteckning').value,
    datum: hasDatum ? (document.getElementById('f-datum')||{value:''}).value : '',
  };
  const month = state.activeMonth === 'alle' ? 'mars' : state.activeMonth;
  if (state.editId) {
    let found = false;
    MONTHS.forEach(m => {
      const i = data[m].findIndex(r => r.id === state.editId);
      if (i >= 0) { data[m][i] = {...data[m][i], ...row}; found = true; }
    });
  } else {
    row.id = nextId++;
    data[month].push(row);
  }
  closeModal('form-overlay');
  saveData();
  render();
}

function deleteRow(id) {
  if (!confirm('Ta bort detta möte?')) return;
  MONTHS.forEach(m => { data[m] = data[m].filter(r => r.id !== id); });
  saveData();
  render();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showExport() { document.getElementById('export-overlay').classList.add('open'); }

function exportData() {
  const blob = new Blob([JSON.stringify({data, nextId}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'moten-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importData(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (d.data && d.nextId) {
        if (confirm('Ersätt all nuvarande data med importerad data?')) {
          data = d.data; nextId = d.nextId;
          saveData(); render();
        }
      } else { alert('Ogiltig fil.'); }
    } catch(err) { alert('Kunde inte läsa filen.'); }
  };
  reader.readAsText(file);
  evt.target.value = '';
}

// Close overlay on bg click
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

loadData();
render();
</script>
</body>
</html>
